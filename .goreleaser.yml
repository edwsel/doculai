version: 2

project_name: doculai

builds:
  - id: doculai
    main: ./cmd/doculai
    binary: doculai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  draft: false
  prerelease: auto
  # On re-runs for the same tag, delete any asset that already exists on the
  # release (422 already_exists) and re-upload it. Makes releases idempotent.
  replace_existing_artifacts: true
  name_template: "{{ .Tag }}"
