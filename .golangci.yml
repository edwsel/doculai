run:
  timeout: 5m
  go: "1.26"
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - revive
    - gosec
    - gocritic
    - unconvert
    - prealloc
    - nolintlint
    - unparam
    - sqlclosecheck
    - errorlint
    - exhaustive
    - gofumpt
    - makezero
    - tparallel
    - gocyclo

linters-settings:
  goimports:
    local-prefixes: github.com/edwsel/doculai
  revive:
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
        disabled: true
      - name: increment-decrement
      - name: indent-error-flow
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: var-declaration
      - name: var-naming
      - name: unreachable-code
      - name: redefines-builtin-id
      - name: superfluous-else
      - name: useless-break
      - name: waitgroup-by-value
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
    disabled-checks:
      - hugeParam
      - rangeValCopy
  gocyclo:
    min-complexity: 25
  errorlint:
    errorf: true
    asserts: true
    comparison: true
  staticcheck:
    checks: ["all"]
  gosec:
    excludes:
      - G104
      - G304
  nolintlint:
    require-explanation: false
    require-specific: true
  prealloc:
    simple: true
    for-loops: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - gocritic
        - prealloc
        - errcheck
        - unparam
        - gocyclo
    - path: test/
      linters:
        - gosec
        - gocritic
        - prealloc
  max-issues-per-linter: 0
  max-same-issues: 0
  fix: false

output:
  formats:
    text:
  sort-results: true
